<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}iOS设备后台管理系统{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 20px;
        }
        .navbar {
            background-color: #2c3e50;
        }
        .navbar-brand {
            color: #ecf0f1;
            font-weight: bold;
        }
        .sidebar {
            background-color: #34495e;
            color: #ecf0f1;
            min-height: calc(100vh - 70px);
        }
        .sidebar a {
            color: #ecf0f1;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
        }
        .sidebar a:hover {
            background-color: #3b5998;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
        }
        .device-status {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
        }
        .status-online {
            background-color: #28a745;
            color: white;
        }
        .status-offline {
            background-color: #dc3545;
            color: white;
        }
        .status-low-battery {
            background-color: #ffc107;
            color: black;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'dashboard' %}">
                <i class="fas fa-mobile-alt"></i> iOS设备后台管理
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user"></i> {{ user.username }}
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="{% url 'dashboard' %}"><i class="fas fa-tachometer-alt"></i> 仪表板</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="{% url 'logout' %}"><i class="fas fa-sign-out-alt"></i> 退出登录</a></li>
                        </ul>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'login' %}"><i class="fas fa-sign-in-alt"></i> 登录</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'register' %}"><i class="fas fa-user-plus"></i> 注册</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            {% if user.is_authenticated %}
            <div class="col-md-2 sidebar">
                <div class="p-3">
                    <h5><i class="fas fa-cog"></i> 管理菜单</h5>
                    <hr style="background-color: #ecf0f1;">
                    <a href="{% url 'dashboard' %}"><i class="fas fa-tachometer-alt"></i> 仪表板</a>
                    <a href="{% url 'devices' %}"><i class="fas fa-mobile-alt"></i> 设备管理</a>
                    <a href="{% url 'background_refresh_management' %}"><i class="fas fa-sync-alt"></i> 后台刷新管理</a>
                    <a href="{% url 'background_activity_management' %}"><i class="fas fa-ban"></i> 后台活动限制</a>
                    <a href="{% url 'policies' %}"><i class="fas fa-shield-alt"></i> 策略管理</a>
                    <a href="{% url 'generate_mdm_profile' %}"><i class="fas fa-download"></i> 下载MDM配置</a>
                    <a href="/admin/" target="_blank"><i class="fas fa-cogs"></i> 后台管理</a>
                    <hr style="background-color: #ecf0f1;">
                    <h5><i class="fas fa-chart-bar"></i> 监控</h5>
                    <a href="#"><i class="fas fa-battery-half"></i> 电池状态</a>
                    <a href="#"><i class="fas fa-network-wired"></i> 网络状态</a>
                    <a href="#"><i class="fas fa-memory"></i> 内存使用</a>
                </div>
            </div>
            {% endif %}

            <!-- 主内容区 -->
            <div class="{% if user.is_authenticated %}col-md-10{% else %}col-md-12{% endif %}">
                <div class="p-4">
                    {% block content %}
                    {% endblock %}
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script>
        // 自动关闭警告框
        setTimeout(function() {
            let alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                let bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            });
        }, 5000);
    </script>
</body>
</html>
