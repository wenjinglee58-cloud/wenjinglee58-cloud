{% extends "dashboard/base.html" %}

{% block title %}登录 - iOS设备后台管理系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> 用户登录</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle"></i> 用户名或密码错误，请重试。
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="id_password" class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" name="password" id="id_password" class="form-control" required>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> 登录
                        </button>
                    </div>
                </form>

                <hr class="my-4">

                <div class="text-center">
                    <p class="mb-2">还没有账户？</p>
                    <a href="{% url 'register' %}" class="btn btn-outline-success">
                        <i class="fas fa-user-plus"></i> 立即注册
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
